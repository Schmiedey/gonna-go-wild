<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing... — GonnaGoWild</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --green-dark: #1a5c2a;
            --green-mid: #2d8a4e;
            --green-light: #4fc978;
            --green-glow: #6fff9e;
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --text: #f0f6fc;
            --text-muted: #8b949e;
            --accent: #ffcc00;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ---- TOP BAR ---- */
        .top-bar {
            background: linear-gradient(135deg, var(--green-dark) 0%, #0f3d1a 100%);
            border-bottom: 3px solid var(--green-light);
            padding: 0.8rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .top-bar a {
            color: var(--green-light);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        .top-bar a:hover { color: var(--accent); }
        .top-bar h1 {
            font-family: 'Bangers', cursive;
            font-size: 1.5rem;
            color: var(--accent);
            letter-spacing: 2px;
        }
        .game-title-bar {
            font-size: 1.1rem;
            color: var(--green-glow);
        }

        /* ---- GAME CONTAINER ---- */
        .game-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .game-container {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 12px;
            border: 2px solid rgba(79,201,120,0.3);
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 40px rgba(79,201,120,0.1);
        }

        .game-container ruffle-embed,
        .game-container object,
        .game-container embed {
            width: 100% !important;
            height: 100% !important;
        }

        /* Loading state */
        .loading-msg {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--text-muted);
        }
        .loading-msg h2 {
            font-family: 'Bangers', cursive;
            font-size: 1.8rem;
            color: var(--green-light);
            margin-bottom: 0.5rem;
        }
        .loading-msg .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(79,201,120,0.2);
            border-top-color: var(--green-light);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 1rem auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-msg {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #ff6b6b;
            display: none;
            max-width: 80%;
        }
        .error-msg h2 {
            font-family: 'Bangers', cursive;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        .error-msg a { color: var(--green-light); }

        /* Controls */
        .controls {
            text-align: center;
            padding: 1rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
        }
        .ctrl-btn {
            background: var(--bg-card);
            border: 1px solid rgba(79,201,120,0.3);
            color: var(--text);
            padding: 0.5rem 1.5rem;
            border-radius: 8px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .ctrl-btn:hover {
            border-color: var(--green-light);
            background: rgba(79,201,120,0.1);
        }

        footer {
            text-align: center;
            padding: 1rem;
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        @media (max-width: 600px) {
            .game-container { border-radius: 8px; }
            .top-bar { padding: 0.6rem 1rem; flex-wrap: wrap; gap: 0.5rem; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <a href="index.html">&larr; Back to Games</a>
    <h1>GONNA GO WILD</h1>
    <span class="game-title-bar" id="gameTitleBar">Loading...</span>
</div>

<div class="game-wrapper">
    <div class="game-container" id="gameContainer">
        <div class="loading-msg" id="loadingMsg">
            <h2>Loading Game...</h2>
            <div class="spinner"></div>
            <p>Powered by Ruffle Flash Emulator</p>
        </div>
        <div class="error-msg" id="errorMsg">
            <h2>Game Not Found</h2>
            <p>This game file hasn't been added yet. Check the <code>/games/</code> folder.</p>
            <p style="margin-top:1rem"><a href="index.html">&larr; Back to game list</a></p>
        </div>
    </div>
</div>

<div class="controls">
    <button class="ctrl-btn" onclick="toggleFullscreen()">Fullscreen</button>
    <button class="ctrl-btn" onclick="location.href='index.html'">All Games</button>
</div>

<footer>
    <p>GonnaGoWild &bull; Kratts Universe &bull; Powered by <a href="https://ruffle.rs" style="color:var(--green-light)">Ruffle</a></p>
</footer>

<!-- Ruffle Flash Emulator -->
<script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

<script>
// ============================================================
// GAME DATABASE (duplicated here for standalone use)
// ============================================================
const GAMES_DB = [
    { id: "go-cheetah-go", title: "Go Cheetah Go!", swfFile: "CheetahGame.swf" },
    { id: "creature-roundup", title: "Creature Roundup", swfFile: "RoundUp.swf" },
    { id: "kickboxing-kangaroo", title: "Kickboxing Kangaroo", swfFile: "KangarooGame.swf" },
    { id: "draco-glide", title: "Glide Draco Glide", swfFile: "DracoGame.swf" },
    { id: "going-batty", title: "Going Batty", swfFile: "BatGame.swf" },
    { id: "slither-run", title: "Slither Run", swfFile: "SlitherRun.swf" },
    { id: "ride-on-remora", title: "Ride On Remora", swfFile: "RemoraGame.swf" },
    { id: "croc-hatch", title: "Croc Hatch", swfFile: "CrocHatch.swf" },
    { id: "firefly-flash", title: "Firefly Flash", swfFile: "FireflyGame.swf" },
    { id: "frogfish-feast", title: "Frogfish Feast", swfFile: "FrogFish.swf" },
    { id: "caracal-leap", title: "Caracal Leap", swfFile: "CaracalGame.swf" },
    { id: "go-nuts", title: "Go Nuts!", swfFile: "SquirrelGame.swf" },
    { id: "webtastic", title: "Webtastic", swfFile: "Webtastic.swf" },
    { id: "dolphin-dive", title: "Dolphin Dive", swfFile: "DolphinDive.swf" },
    { id: "creaturepedia", title: "Creaturepedia", swfFile: "Creaturepedia.swf" },
    { id: "african-savannah", title: "African Savannah", swfFile: "SavannahHabitat.swf" },
    { id: "australian-outback", title: "Australian Outback", swfFile: "AustraliaHabitat.swf" },
    { id: "rainforest", title: "Rainforest", swfFile: "RainforestHabitat.swf" },
    { id: "coral-reef", title: "Coral Reef", swfFile: "ReefHabitat.swf" },
    { id: "boreal-forest", title: "Boreal Forest", swfFile: "BorealHabitat.swf" },
    { id: "ocean-habitat", title: "Ocean Habitat", swfFile: "OceanHabitat.swf" },
    { id: "sonoran-desert", title: "Sonoran Desert", swfFile: "DesertHabitat.swf" },
    { id: "your-room", title: "Your Room", swfFile: "AvatarRoom.swf" },
];

// ============================================================
// LOAD GAME
// ============================================================
const params = new URLSearchParams(window.location.search);
const gameId = params.get('game');
const gameData = GAMES_DB.find(g => g.id === gameId);

if (gameData) {
    document.title = `${gameData.title} — GonnaGoWild`;
    document.getElementById('gameTitleBar').textContent = gameData.title;

    const container = document.getElementById('gameContainer');
    const swfUrl = `games/${gameData.swfFile}`;

    // Use Ruffle to load the SWF
    window.RufflePlayer = window.RufflePlayer || {};
    window.addEventListener("DOMContentLoaded", () => {
        loadGame(swfUrl);
    });

    // Also try immediately if DOM is already loaded
    if (document.readyState !== 'loading') {
        loadGame(swfUrl);
    }

    function loadGame(url) {
        // Check if game file exists first
        fetch(url, { method: 'HEAD' })
            .then(response => {
                if (!response.ok) throw new Error('File not found');

                const ruffle = window.RufflePlayer.newest();
                const player = ruffle.createPlayer();
                player.style.width = '100%';
                player.style.height = '100%';

                // Hide loading message and add player
                document.getElementById('loadingMsg').style.display = 'none';
                container.appendChild(player);

                player.load(url);
            })
            .catch(err => {
                document.getElementById('loadingMsg').style.display = 'none';
                const errorDiv = document.getElementById('errorMsg');
                errorDiv.style.display = 'block';
                errorDiv.querySelector('p').innerHTML =
                    `<strong>${gameData.swfFile}</strong> wasn't found in the <code>/games/</code> folder.<br><br>` +
                    `Download it from: <a href="https://archive.org/download/wild-kratts-flash-games-pbs-kids/${gameData.swfFile}" target="_blank">Internet Archive</a><br>` +
                    `Then place it in your site's <code>/games/</code> directory.`;
            });
    }
} else {
    document.getElementById('gameTitleBar').textContent = 'Unknown Game';
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'block';
}

// ============================================================
// FULLSCREEN
// ============================================================
function toggleFullscreen() {
    const container = document.getElementById('gameContainer');
    if (!document.fullscreenElement) {
        container.requestFullscreen().catch(err => {
            alert('Fullscreen not supported in this browser context');
        });
    } else {
        document.exitFullscreen();
    }
}
</script>

</body>
</html>
